disabled_rules:
  - trailing_whitespace
  - comma                         # column-aligned args in data files
  - implicit_optional_initialization
  - trailing_comma
  - function_parameter_count      # game models/card constructors legitimately have many params

opt_in_rules:
  - force_unwrapping              # flag every ! unwrap

included:
  - runedraw

excluded:
  - runedraw.xcodeproj
  - runedraw/runedrawApp.swift    # Xcode-generated

# Allow short names — h/f/e/i/c/v are idiomatic Swift (local copies, loop vars)
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60

line_length:
  warning: 120
  error: 270               # generous error threshold for column-aligned data files

# Game engine functions and SwiftUI drawing functions are legitimately long
function_body_length:
  warning: 200
  error: 600

# SwiftUI views and game engine are inherently large types
type_body_length:
  warning: 600
  error: 1300

# Game files contain multiple view structs and large data tables
file_length:
  warning: 800
  error: 1500

# Game state machines and card effect resolvers have deep branching
cyclomatic_complexity:
  warning: 30
  error: 55
